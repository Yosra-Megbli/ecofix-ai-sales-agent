<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecofix - Assistant Énergie IA</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for clean icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="app-header-id">
            <div class="header-logo">
                <span class="logo-text">Ecofix</span>
                <span class="logo-dot"></span>
            </div>
            <div class="header-subtitle">
                <span class="subtitle-text">Assistant Énergie IA</span>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-label">En ligne</span>
                </div>
            </div>
        </header>

        <!-- Chat Container -->
        <main class="chat-container" id="chat-container-id">
            <div class="chat-messages" id="chat-messages-id">
                <!-- Messages will be injected here by script.js -->
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator-wrapper hidden" id="typing-indicator-id">
                <div class="typing-bubble">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
                <span class="typing-label">Ecofix est en train d'écrire...</span>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-input-area" id="chat-input-area-id">
            <form id="chat-form-id" class="chat-form" onsubmit="return false;">
                <input 
                    type="text" 
                    id="user-input-id" 
                    class="user-input" 
                    placeholder="Écrivez votre message ici..." 
                    autocomplete="off" 
                    required
                >
                <button type="submit" id="send-btn-id" class="send-btn" aria-label="Envoyer le message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
